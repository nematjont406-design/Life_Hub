{% extends 'base.html' %}
{% block title %}Gallery{% endblock %}
{% block content %}
<!-- Mobile Gallery - iPhone 16 Pro Style -->
<div class="mobile-viewport">
    <div class="mobile-dashboard">
        <!-- Header -->
        <header class="mobile-header">
            <div class="header-container">
                <button class="header-icon hamburger-btn" aria-label="Menu" onclick="toggleSidebar()">
                    <i class="fas fa-bars"></i>
                </button>
                <div class="header-logo">Gallery</div>
                <button class="header-icon theme-btn" aria-label="Theme" onclick="toggleMobileTheme()">
                    <i class="fas fa-moon"></i>
                </button>
            </div>
        </header>

        <!-- Search Bar -->
        <div class="mobile-search-container">
            <div class="mobile-search-bar">
                <i class="fas fa-search search-icon"></i>
                <input type="text" placeholder="Search images..." class="mobile-search-input" id="mobileGallerySearch">
            </div>
        </div>

        <!-- Gallery Section -->
        <div class="mobile-section gallery-section" style="margin: 0 20px 16px;">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
                <h3 style="color: var(--primary); font-size: 16px; margin: 0;"><i class="fas fa-images"></i> My Gallery</h3>
                <button class="header-icon" aria-label="Add Image" onclick="showAddImageModal()" style="width: 36px; height: 36px;">
                    <i class="fas fa-plus"></i>
                </button>
            </div>
            
            {% if images %}
                <div class="gallery-grid" style="grid-template-columns: repeat(3, 1fr); gap: 10px;">
                    {% for image in images %}
                    <div class="gallery-item" style="aspect-ratio: 1; border-radius: 12px; overflow: hidden; border: 1px solid var(--glass-border);">
                        <img src="{{ image.image.url }}" alt="{{ image.title }}" style="width: 100%; height: 100%; object-fit: cover;">
                    </div>
                    {% endfor %}
                </div>
            {% else %}
                <p style="opacity: 0.7; text-align: center; padding: 20px; font-size: 14px;">No images yet. Add your first image!</p>
            {% endif %}
        </div>
    </div>

    <!-- Bottom Navigation -->
    <nav class="mobile-bottom-nav">
        <div class="bottom-nav-container">
            <a href="{% url 'mobile_dashboard' %}" class="bottom-nav-item">
                <i class="fas fa-home"></i>
            </a>
            <a href="{% url 'profile' %}" class="bottom-nav-item">
                <i class="fas fa-user"></i>
            </a>
        </div>
    </nav>
</div>
{% endblock %}

{% block extra_js %}
<script>
// Mobile-specific initialization
document.addEventListener('DOMContentLoaded', function() {
    // Update theme icon based on saved preference
    if (localStorage.getItem('darkMode') === 'true') {
        const themeIcon = document.querySelector('.theme-btn i');
        if (themeIcon) {
            themeIcon.className = 'fas fa-sun';
        }
    }
});
</script>
{% endblock %}

{% extends 'base.html' %}
{% block title %}Parolni tiklash{% endblock %}
{% block content %}
<div class="auth-container">
    <div class="auth-content">
        <!-- Left Side - Info -->
        <div class="auth-info">
            <h1 style="font-size: 36px; margin-bottom: 20px;">LifeHub</h1>
            <p style="font-size: 18px; line-height: 1.6; opacity: 0.9;">
                Parolni tiklash - Email manzilingizni kiriting
            </p>
        </div>

        <!-- Right Side - Form -->
        <div class="auth-form">
            <h2><i class="fas fa-key"></i> Parolni tiklash</h2>
            <form method="POST">
                {% csrf_token %}
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" name="email" placeholder="email@example.com" required>
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%;">Tiklash</button>
                <p style="margin-top: 20px; text-align: center; font-size: 14px;">
                    <a href="{% url 'login' %}" style="color: var(--primary);">Kirish sahifasiga qaytish</a>
                </p>
            </form>
        </div>
    </div>
</div>
{% endblock %}
